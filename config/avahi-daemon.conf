# airprint-v2 — Avahi reflector configuration.
# Reflects mDNS (Bonjour) packets between every interface the container has.
# Bridge the LXC into each VLAN you want AirPrint/AirScan to reach, OR keep
# the LXC on the printer VLAN and rely on a reflector elsewhere on the
# network — but don't run two reflectors at once (duplicate announcements).

[server]
# host-name / domain-name omitted: Avahi auto-detects from /etc/hostname so
# this config keeps working when the LXC is renamed.
use-ipv4=yes
use-ipv6=yes
# Restrict to local NICs only — explicitly list them if you want to be safe.
# allow-interfaces=eth0,eth1
# deny-interfaces=
ratelimit-interval-usec=1000000
ratelimit-burst=1000

[wide-area]
enable-wide-area=no

[publish]
publish-addresses=yes
publish-hinfo=no
publish-workstation=no
publish-domain=yes
publish-resolv-conf-dns-servers=no
publish-aaaa-on-ipv4=yes
publish-a-on-ipv6=no

[reflector]
enable-reflector=yes
reflect-ipv=no

[rlimits]
rlimit-core=0
rlimit-data=8388608
rlimit-fsize=0
rlimit-nofile=768
rlimit-stack=8388608
rlimit-nproc=4
