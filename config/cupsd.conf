# /etc/cups/cupsd.conf — managed by airprint-v2.
# This file is written wholesale by install.sh; the original is kept at
# /etc/cups/cupsd.conf.airprint-orig.

LogLevel warn
# Per-page audit trail (drives "page X of Y" visibility — useful both for
# /var/log/cups/page_log and for confirming that filters are reporting
# progress, which is what feeds iOS's Live Activity / Dynamic Island).
PageLogFormat "%p %u %j %T %P %C %{job-billing} %{job-originating-host-name} %{job-name} %{media} %{sides}"
MaxLogSize 0
ErrorPolicy retry-job

# Listen on all interfaces so AirPrint clients on the LAN can reach us.
Listen localhost:631
Listen *:631

# Bonjour / DNS-SD: advertise queues over mDNS so iOS/macOS see them.
Browsing On
BrowseLocalProtocols dnssd
BrowseRemoteProtocols
DefaultShared Yes
WebInterface Yes

# Job retry — the iR 1133A drops idle TCP sessions aggressively.
JobRetryLimit 5
JobRetryInterval 30

# Notification subscriptions iOS uses for Live Activity / Dynamic Island.
# CUPS supports these out of the box; making the defaults explicit ensures
# job-progress events (page X of Y) are pushed to subscribed clients.
DefaultEncryption IfRequested
DefaultAuthType Basic

<Location />
  Order allow,deny
  Allow @LOCAL
</Location>

<Location /admin>
  Order allow,deny
  Allow @LOCAL
</Location>

<Location /admin/conf>
  AuthType Default
  Require user @SYSTEM
  Order allow,deny
  Allow @LOCAL
</Location>

<Location /admin/log>
  AuthType Default
  Require user @SYSTEM
  Order allow,deny
  Allow @LOCAL
</Location>

# Default policy — single-household: anyone on the LAN can print, only
# @SYSTEM can administer.
<Policy default>
  JobPrivateAccess default
  JobPrivateValues default
  SubscriptionPrivateAccess default
  SubscriptionPrivateValues default

  <Limit Create-Job Print-Job Print-URI Validate-Job>
    Order deny,allow
  </Limit>

  <Limit Send-Document Send-URI Hold-Job Release-Job Restart-Job Purge-Jobs Set-Job-Attributes Create-Job-Subscription Renew-Subscription Cancel-Subscription Get-Notifications Reprocess-Job Cancel-Current-Job Suspend-Current-Job Resume-Job Cancel-My-Jobs Close-Job CUPS-Move-Job CUPS-Get-Document>
    Require user @OWNER @SYSTEM
    Order deny,allow
  </Limit>

  <Limit CUPS-Add-Modify-Printer CUPS-Delete-Printer CUPS-Add-Modify-Class CUPS-Delete-Class CUPS-Set-Default CUPS-Get-Devices>
    AuthType Default
    Require user @SYSTEM
    Order deny,allow
  </Limit>

  <Limit Pause-Printer Resume-Printer Enable-Printer Disable-Printer Pause-Printer-After-Current-Job Hold-New-Jobs Release-Held-New-Jobs Deactivate-Printer Activate-Printer Restart-Printer Shutdown-Printer Startup-Printer Promote-Job Schedule-Job-After Cancel-Jobs CUPS-Accept-Jobs CUPS-Reject-Jobs>
    AuthType Default
    Require user @SYSTEM
    Order deny,allow
  </Limit>

  <Limit Cancel-Job CUPS-Authenticate-Job>
    Require user @OWNER @SYSTEM
    Order deny,allow
  </Limit>

  <Limit All>
    Order deny,allow
  </Limit>
</Policy>
