# /etc/cups/snmp.conf — managed by airprint-v2.
# Enables CUPS' SNMP supplies/page-counter polling for printers on the LAN.
# This is what surfaces toner level, paper status, and the printer's lifetime
# page counter in the iOS / macOS print dialog and in the CUPS web UI.
#
# Single-household assumption: SNMPv1 with the standard 'public' community is
# fine — the LXC's firewall blocks SNMP from outside the LAN, and the printer
# itself is read-only via SNMP by default.

Address @LOCAL
Community public
DebugLevel 0
HostNameLookups off
MaxRunTime 15
